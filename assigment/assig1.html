<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Perfect UI Calculator</title>
    <style>
        .calculator-box {
            width: 400px;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            background-color: #f5f5f5;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }

        .calculator-row {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 22px;
            text-align: right;
            box-sizing: border-box;
        }

        button {
            width: 60px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            background-color: #e0e0e0;
            border: 2px solid #999;
            border-radius: 5px;
        }

        button:hover {
            background-color: #d0d0d0;
        }

        button.active {
            background-color: #4CAF50;
            color: white;
        }

        .operator-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .operator-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #output {
            text-align: center;
            width: 100%;
            font-size: 20px;
            background-color: #d4f5d4;
            border: 1px solid green;
            border-radius: 8px;
            padding: 12px;
            height: 50px;
            box-sizing: border-box;
            text-align: center;
        }

        .mid-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-ops {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .horizontal-buttons {
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>
    <div class="calculator-box">

        <!-- Input Fields -->
        <div class="calculator-row">
            <input type="number" id="operand1" placeholder="First number" />
        </div>
        <div class="calculator-row">
            <input type="number" id="operand2" placeholder="Second number" />
        </div>

        <!-- Operator buttons + result beside -->
        <div class="mid-row">
            <div class="left-ops">
                <div class="horizontal-buttons">
                    <button onclick="calculate('+')">+</button>
                    <button onclick="calculate('-')">-</button>
                </div>
                <div class="horizontal-buttons">
                    <button onclick="calculate('*')">*</button>
                    <button onclick="calculate('/')">/</button>
                </div>
                <div class="horizontal-buttons">
                    <button onclick="calculate('%')">%</button>
                </div>
            </div>

                <div id="output">Result will appear here</div>
        </div>
    </div>
<script src="assig1.js"></script>
</body>

</html>
